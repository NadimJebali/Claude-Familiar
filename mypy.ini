# mypy config — dev-only static type checking (issue #15). Run with:
#     python -m mypy mascot hooks
# A pragmatic baseline on a fully-hinted, tkinter-heavy codebase: it checks the
# annotated code without demanding full --strict everywhere. Tighten over time.
[mypy]
python_version = 3.11
# hooks/ modules import each other as top-level names (a sys.path hack in emit.py),
# so let mypy resolve `import proc` / `import state_logic` from there.
mypy_path = hooks
warn_unused_ignores = True
warn_redundant_casts = True

# Third-party runtime deps without bundled type stubs (adopted under ADR-0001).
# Ignore *their* missing types; our own code at the call sites is still checked.
[mypy-psutil.*]
ignore_missing_imports = True

[mypy-pystray.*]
ignore_missing_imports = True

[mypy-plyer.*]
ignore_missing_imports = True

[mypy-win32com.*]
ignore_missing_imports = True

# fcntl is POSIX-only; on Windows mypy sees the module as empty, so the flock call
# carries a `# type: ignore[attr-defined]` that is *used* on Windows but redundant on
# Linux — don't flag it as unused there. (This module genuinely uses platform-only
# APIs on both sides: ctypes.windll on Windows, fcntl on POSIX.)
[mypy-mascot.single_instance]
warn_unused_ignores = False
